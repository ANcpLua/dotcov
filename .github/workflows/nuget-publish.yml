name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (without v prefix)'
        required: true

permissions:
  contents: read
  id-token: write

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_NOLOGO: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      is_release: ${{ steps.ver.outputs.is_release }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - id: ver
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.$(git rev-list --count HEAD)-ci.g$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
      - run: dotnet build DotCov.slnx -c Release -p:Version=${{ needs.version.outputs.version }}
        env:
          CI: true

  test:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
      - name: Test
        run: dotnet test DotCov.slnx -c Release -p:Version=${{ needs.version.outputs.version }} --collect:"XPlat Code Coverage" --settings coverlet.runsettings --results-directory TestResults
        env:
          CI: true
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: TestResults/**/coverage.cobertura.xml
          flags: ${{ matrix.os }}
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # Native AOT packages for DotCov.Tool — one RID per runner (Native AOT cannot cross-OS
  # compile, so each OS's package is built on that OS). Release-only; fail-fast so a single
  # RID failure fails the whole job and gates `publish` (no partial/broken RID set ships).
  pack-tool-native:
    needs: version
    if: needs.version.outputs.is_release == 'true'
    strategy:
      fail-fast: true
      matrix:
        include:
          - { os: macos-latest,     rid: osx-arm64 }
          - { os: ubuntu-latest,    rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
      - name: Install Native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev
      - name: Pack ${{ matrix.rid }} (Native AOT)
        run: dotnet pack src/DotCov.Tool/DotCov.Tool.csproj -c Release -r ${{ matrix.rid }} -p:Version=${{ needs.version.outputs.version }} -o artifacts
        env:
          CI: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pkg-${{ matrix.rid }}
          path: artifacts/*.nupkg
          if-no-files-found: error

  # The RID-agnostic pieces: portable CoreCLR `any` fallback (Windows/Intel-Mac/musl/...),
  # the DotCov.Tool pointer package, and the plain DotCov + DotCov.Nuke library packages.
  pack-rest:
    needs: version
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json
      - name: Pack any-fallback, pointer, and libraries
        run: |
          V=${{ needs.version.outputs.version }}
          dotnet pack src/DotCov.Tool/DotCov.Tool.csproj -c Release -r any -p:PublishAot=false -p:Version=$V -o artifacts
          dotnet pack src/DotCov.Tool/DotCov.Tool.csproj -c Release -p:Version=$V -o artifacts
          dotnet pack src/DotCov/DotCov.csproj           -c Release -p:Version=$V -o artifacts
          dotnet pack src/DotCov.Nuke/DotCov.Nuke.csproj -c Release -p:Version=$V -o artifacts
        env:
          CI: true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: pkg-rest
          path: artifacts/*.nupkg
          if-no-files-found: error

  publish:
    needs: [version, build, test, pack-tool-native, pack-rest]
    if: needs.version.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: artifacts
          pattern: pkg-*
          merge-multiple: true
      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
      - name: Authenticate to NuGet (trusted publishing)
        id: login
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        with:
          user: ANcpLua
      # Push every sub-package FIRST (RID-specific, `any`, and the libraries). The DotCov.Tool
      # *pointer* is held back: NuGet requires the packages it references to exist before it.
      - name: Push sub-packages
        run: |
          shopt -s nullglob
          POINTER="DotCov.Tool.${{ needs.version.outputs.version }}.nupkg"
          for pkg in artifacts/*.nupkg; do
            [ "$(basename "$pkg")" = "$POINTER" ] && continue
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json \
              --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate
          done
      # Pointer LAST, as its own step — only reached if every sub-package push above succeeded.
      # If a sub-package 403s or fails, the job aborts here and no broken pointer is published.
      - name: Push the DotCov.Tool pointer
        run: |
          dotnet nuget push "artifacts/DotCov.Tool.${{ needs.version.outputs.version }}.nupkg" \
            --source https://api.nuget.org/v3/index.json \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate
